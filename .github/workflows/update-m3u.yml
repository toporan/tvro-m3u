name: Update and Validate Romanian TV M3U

on:
  schedule:
    # Run every 6 hours (adjust as needed)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]

jobs:
  update-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Fetch latest Romanian channels from IPTV-Org
      run: |
        # Download fresh Romanian playlist from IPTV-Org
        curl -L -o sources/iptv-org-ro.m3u https://iptv-org.github.io/iptv/countries/ro.m3u
        
    - name: Run health check and update playlist
      run: python scripts/validator.py
      
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Refresh streams and validate channels [$(date +%Y-%m-%d)]"
        git push
