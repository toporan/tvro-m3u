name: Filter and Update Romanian TV M3U

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

# Fix: Prevent concurrent runs and infinite loops
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter-and-update:
    runs-on: ubuntu-latest
    
    # Fix: Skip if last commit was from this action
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    
    # Fix: CRITICAL - Grant write permissions to the bot
    permissions:
      contents: write  # Required for git push [^53^][^61^]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Fix: Ensure credentials persist for git push
        persist-credentials: true
        
    - name: Set up Python
      uses: actions/setup-python@v6  # Updated to v6 (Node.js 24) [^43^][^57^]
      with:
        python-version: '3.11'
        
    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run validator
      run: |
        python scripts/validator.py
        echo "Exit code: $?"
        
    - name: Verify playlist exists
      run: |
        if [ ! -f romania_tv.m3u ]; then
          echo "❌ ERROR: romania_tv.m3u not created!"
          ls -la
          exit 1
        fi
        WORKING=$(grep -c '^http' romania_tv.m3u || echo "0")
        echo "✅ Working channels: $WORKING"
        
    - name: Configure git
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
    - name: Check for changes
      id: check_changes
      run: |
        git add romania_tv.m3u health_report.json dead_channels.m3u 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes to commit"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Changes detected"
        fi
        
    - name: Commit and push
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git commit -m "🔥 Auto-filter dead channels [$(date +%Y-%m-%d %H:%M)] [skip ci]"
        # Fix: Use GITHUB_TOKEN for authentication
        git push https://${{ github.token }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
